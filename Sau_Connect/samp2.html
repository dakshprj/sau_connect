<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GlobalBank - Dark Theme</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->

            background-color: #0d1117;
            color: #e6edf3;
        }

        /* HEADER */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background: #161b22;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #30363d;
        }

        .logo {
            font-size: 28px;
            font-weight: 700;
            color: #58a6ff;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 25px;
        }

        nav a {
            color: #e6edf3;
            text-decoration: none;
            font-weight: 500;
        }

        nav a:hover {
            color: #58a6ff;
        }

        .header-actions button {
            background: #21262d;
            border: 1px solid #30363d;
            color: #e6edf3;
            padding: 8px 14px;
            margin-left: 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        .header-actions button:hover {
            background: #30363d;
        }

        .hero {

            align-items: center;

        }

        .hero-content {
            max-width: 650px;
        }

        .hero h1 {
            font-size: 48px;
            margin-bottom: 20px;
            color: #58a6ff;
        }

        .hero p {
            font-size: 18px;
            color: #b1bac4;
            margin-bottom: 30px;
        }

            padding: 12px 28px;
            background: #58a6ff;
            color: #0d1117;
            font-weight: 600;
            text-decoration: none;
            border-radius: 4px;
        }

        .hero a:hover {
            background: #1f6feb;
        }

            margin: auto;
