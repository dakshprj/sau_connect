<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Get Started - Input Credentials</title>
  <style>
    /* Basic Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #121212;
      color: #e0e0e0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      padding: 20px;
    }

    .form-container {
      background-color: #1f1f1f;
      padding: 40px 30px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(97, 218, 251, 0.5);
      width: 100%;
      max-width: 400px;
    }

    h2 {
      text-align: center;
      margin-bottom: 30px;
      color: #61dafb;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #a0cfff;
    }

    input[type="text"],
    input[type="tel"],
    select,
    textarea {
      width: 100%;
      padding: 10px 12px;
      margin-bottom: 20px;
      border: none;
      border-radius: 6px;
      background-color: #2b2b2b;
      color: #e0e0e0;
      font-size: 15px;
      resize: vertical;
    }

    input[type="text"]::placeholder,
    input[type="tel"]::placeholder,
    textarea::placeholder {
      color: #777;
    }

    select {
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      background-image: url("data:image/svg+xml;charset=US-ASCII,%3csvg%20width%3d%2212%22%20height%3d%227%22%20viewBox%3d%220%200%2012%207%22%20xmlns%3d%22http%3a//www.w3.org/2000/svg%22%3e%3cpath%20d%3d%22M1%200l5%207%205-7H1z%22%20fill%3d%22%23a0cfff%22/%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 12px center;
      background-size: 12px 7px;
      cursor: pointer;
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: #61dafb;
      color: #121212;
      font-weight: 700;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #21a1f1;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .form-container {
        padding: 30px 20px;
      }
    }
  </style>
</head>
<body>

  <div class="form-container">
    <h2>Get Started</h2>
    <form action="#" method="POST">
      <label for="name">Full Name</label>
      <input type="text" id="name" name="name" placeholder="Your full name" required />

      <label for="address">Address</label>
      <textarea id="address" name="address" rows="3" placeholder="Your address" required></textarea>

      <label for="mobile">Mobile Number</label>
      <input type="tel" id="mobile" name="mobile" placeholder="+1 234 567 8900" pattern="[+0-9\s\-]{7,15}" required />

      <label for="service">Service You're Looking For</label>
      <select id="service" name="service" required>
        <option value="" disabled selected>Select a service</option>
        <option value="consulting">Consulting</option>
        <option value="investment">Investment</option>
        <option value="wealth-management">Wealth Management</option>
        <option value="retirement-planning">Retirement Planning</option>
        <option value="other">Other</option>
      </select>

      <button type="submit">Submit</button>
    </form>
  </div>

</body>
</html>
